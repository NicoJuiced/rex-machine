name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. rex extract /path/to/repo
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: rex-machine version
      description: Output of `rex --version`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Anthropic (direct)
        - Azure AI Foundry
        - AWS Bedrock
        - Google Vertex AI
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Verbose logs
      description: Run with `-v` and paste relevant output.
      render: shell
